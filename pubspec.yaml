name: portal_app
description: Agent Portal - P2P Communication App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  url_launcher: ^6.3.0
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  dio: ^5.4.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # UI 组件
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  file_picker: ^11.0.0
  
  # 工具
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  sqflite: ^2.3.0
  
  # WebRTC (后续添加)
  flutter_webrtc: ^1.0.0

  # 版本自更新(GitHub Release)
  package_info_plus: ^8.0.0
  open_filex: ^4.5.0
  permission_handler: ^11.3.0

dev_dependencies:
  url_launcher: ^6.3.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
